<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Sample 2</title>
  </head>
  <body>
    <h1>Text Concatenator</h1>
    <table>
      <tr>
        <td>
          <label for="num1">First Name:</label>
        </td>
        <td>
          <input
            type="text"
            name="fname"
            id="fname"
            placeholder="Enter first name"
          />
        </td>
      </tr>
      <tr>
        <td>
          <label for="num2">Middle Name:</label>
        </td>
        <td>
          <input
            type="text"
            name="mname"
            id="mname"
            placeholder="Enter middle name"
          />
        </td>
      </tr>
      <tr>
        <td>
          <label for="num2">Last Name:</label>
        </td>
        <td>
          <input
            type="text"
            name="lname"
            id="lname"
            placeholder="Enter last name"
          />
        </td>
      </tr>
      <tr>
        <td></td>
        <td>
          <button onclick="concatenate()">Generate Full Name</button>
          <button onclick="clearEntries()">Clear Entries</button>
        </td>
      </tr>
    </table>

    <p style="font-weight: bold">Full Name:</p>
    <span id="fullName"></span>

    <script src="script.js"></script>
  </body>
</html>
